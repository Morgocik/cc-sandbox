# cc-sandbox per-project configuration
# Place this file in your project root.

# Additional read-only mounts (space-separated paths)
# Example: EXTRA_BIND_RO="/home/user/shared-data /home/user/reference"
EXTRA_BIND_RO=""

# Additional read-write mounts (space-separated paths)
# Example: EXTRA_BIND_RW="/home/user/output"
EXTRA_BIND_RW=""

# Paths to hide from the sandbox (space-separated). Relative paths resolve against
# the project root; absolute paths (starting with /) are used as-is. A directory is
# replaced with an empty ephemeral tmpfs, a file with an empty read-only mount.
# Note: only hides paths that already exist when the sandbox launches.
# Example: EXCLUDE_PATHS=".env secrets/ config/prod.key"
EXCLUDE_PATHS=""

# Extra environment variables (space-separated KEY=VALUE pairs)
# Example: ENV_VARS="API_KEY=xyz DEBUG=1"
ENV_VARS=""

# Debug mode — write bwrap command to .cc-sandbox.log and exit without launching
# DEBUG=true
